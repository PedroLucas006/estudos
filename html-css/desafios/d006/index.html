<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tags HTML</title>

</head>

<body>
  <h1>Tags em HTML</h1>
  <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
  <ul type="square">
    <li><abbr title="Use a tag &lt;p&gt;">Parágrafos</abbr></li>
    <li><abbr title="Use a tag &lt;q&gt;">Citações simples</abbr></li>
    <li><abbr title="Pode ser usada a tag &lt;h1&gt; até o &lt;h6&gt;">Títulos</abbr></li>
    <li><abbr title="Use a tag &lt;a&gt; com o parâmetro href">Âncoras</abbr></li>
    <li><abbr title="Use a tag &lt;abbr&gt; com o parâmetro title">Abreviações</abbr></li>
    <li><abbr title="Use a tag &lt;br&gt;">Quebra de linhas</abbr></li>
    <li><abbr title="Use a tag &lt;hr&gt;">Linhas horizontais</abbr></li>
  </ul>
  
</body>

</html>
