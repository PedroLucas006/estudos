<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
  <form action="cadastro.php" method="get">
    
    <fieldset>
      <legend>Sexo</legend>
      
      <input type="radio" name="sexo" id="mas" value="M" required>
      <label for="mas">Masculino</label><br>
      
      <input type="radio" name="sexo" id="fem" value="F" required>
      <label for="fem">Feminino</label>
      
    </fieldset>
    
    <fieldset>
      <legend>Esportes</legend>
      
      <input type="checkbox" name="futebol" id="futebol" checked>
      <label for="futebol"> Futebol</label><br>
      
      <input type="checkbox" name="basquete" id="basquete">
      <label for="basquete"> Basquete</label><br>
      
      <input type="checkbox" name="volei" id="volei">
      <label for="volei"> Vôlei</label><br>
      
      <input type="checkbox" name="skate" id="skate">
      <label for="skate"> Skate</label><br>
      
      <input type="checkbox" name="tenis" id="tenis">
      <label for="tenis"> Tênis</label>
      
    </fieldset>
    
    <p>
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">
    </p>
    
  </form>
</body>
</html>
