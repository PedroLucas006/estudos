<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
  <h1>Mais Formulários</h1>
  <form method="GET" autocomplete="on" action="cadastro.php">
    <p>
      <label for="nome">Nome </label>
      <input type="text" name="nome" id="nome" required placeholder="Nome completo" autocomplete="name">
    </p>
    
    <p>
      <label for="media">Média </label>
      <input type="number" name="media" id="media" required min="0" max="10" step="0.5" value="0">
    </p> 
    
    <p>
      <label for="mes">Mês </label>
      <input type="month" name="mes" id="mes" required value="2026-05">
    </p>
    
    <p>
      <label for="dia">Dia da prova </label>
      <input type="date" name="dia" id="dia" required value="2026-05-07">
    </p>
    
    <p>
      <label for="hora">Horário </label>
      <input type="time" name="hora" id="hora" required value="00:00">
    </p>
    
    <p>
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">
    </p>
    
  </form>
</body>
</html>
