<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
  <form action="cadastro.php" method="post">
  
    <label for="estado">Estado: </label>
    <select name="estado" id="estado">
      
      <option value="" selected>--- Escolha ---</option>
      <optgroup label="Região Sudeste">
        
        <option value="RJ">Rio de Janeiro</option>
        <option value="SP">São Paulo</option>
        <option value="MG">Minas Gerais</option>
        <option value="ES">Espiríto Santo</option>
        
      </optgroup>
      
      <optgroup label="Região Sul">
        
        <option value="PR">Paraná</option>
        <option value="SC">Santa Catarina</option>
        <option value="RS">Rio Grande do Sul</option>
        
      </optgroup>
      
      <optgroup label="Região Norte">
        
        <option value="AM">Amazonas</option>
        <option value="TO">Tocantis</option>
        <option value="RR">Roraima</option>
        <option value="RO">Rondônia</option>
        <option value="PA">Pará</option>
        <option value="AP">Amapá</option>
        <option value="AC">Acre</option>
        
      </optgroup>
      
      <optgroup label="Região Nordeste">
        
        <option value="BA">Bahia</option>
        <option value="PE">Pernambuco</option>
        <option value="CE">Ceará</option>
        <option value="SE">Sergipe</option>
        <option value="PI">Piauí</option>
        <option value="MA">Maranhão</option>
        <option value="RN">Rio Grande do Norte</option>
        <option value="AL">Alagoas</option>
        
      </optgroup>
      
      <optgroup label="Região Centro-Oeste">
        
        <option value="GO">Goiás</option>
        <option value="MS">Mato Grosso do Sul</option>
        <option value="MT">Mato Grosso</option>
        
      </optgroup>
      
    </select>
    <p>
      <label for="profissao">Profissão: </label>
      <input type="text" name="profissao" id="profissao" list="prof" required>
    </p>
    <datalist id="prof">
      
      <option>Administrador</option>
      <option>Biomédico</option>
      <option>Dentista</option>
      <option>Desenvolvedor</option>
      <option>Engenheiro</option>
      <option>Farmacêutico</option>
      <option>Guia</option>
      <option>Jornalista</option>
      <option>Médico</option>
      <option>Professor</option>
      
    </datalist>
    
    <p>
      <label for="msg">Mensagem: </label>
      </p>
      
    <textarea name="msg" id="msg" cols="30" rows="10" placeholder="Escreva sua memsagem aqui" style="resize:none" maxlength="300" required></textarea>
    
    <p>
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">
    </p>
    
  </form>
</body>
</html>
