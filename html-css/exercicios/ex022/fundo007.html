<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Centralização vertical</title>
    <style>
    body {
      height: 100vh
    }
    #container {
      background-image: url('imagens/target001.png');
      background-size: 100% 100%;
      background-color: #964D4B;
      height: 80%;
    }
    #conteudo {
      background-image: url('imagens/target001.png');
      background-size: 100% 100%;
      background-color: #48AB67;
      width: 600px;
      height: 300px;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -40%);
    }
    </style>
</head>
<body>
  <section id="container">
    <article id="conteudo">
      
    </article>
  </section>
</body>
</html>
