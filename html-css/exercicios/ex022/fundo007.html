<head>

    <title>Centralização vertical</title>
    <style>
    body {
      height: 100vh;
    }
    #container {
      background-color: blue;

      background: green url('imagens/target001.png') center center no-repeat fixed;

      height: 300px

    }

</head>
<body>
  <section id="container">
    <article id="conteudo">
      
    </article>
  </section>
</body>
</html>
