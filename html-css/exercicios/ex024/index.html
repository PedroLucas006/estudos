<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Iframes</title>
    <style>
    
    body {
      font-family: Arial, Helvetica, Sans-Serif;
    }
    
    iframe {
      width: 400px;
      height: 550px;
      border: 2px dashed black;
      display: block;
    }
    
    a {
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    </style>
</head>
<body>
  <h1>Testando o uso de iframes</h1>
  <p>Você pode acessar o site do 
  
  <iframe src="https://www.cursoemvideo.com/" frameborder="0"><a href="https://www.cursoemvideo.com/" target="_blank" scolling="no">Curso em Video</a></iframe>
  
  para aprender a programar
  </p>
  <p>O iframe não consegue acessar sites que negam seu uso por questões de segurança como o 
  
  <iframe src="https://www.google.com.br/" frameborder="1px"></iframe></p>
  
  <p>Acesse meu repositório
  
  <iframe src="https://pedrolucas006.github.io/estudos/" frameborder="0" scolling="yes">no<a href="https://pedrolucas006.github.io/estudos/" target="_blank">GitHub</a></iframe> 
  
  e aproveite
  </p>
  <p><a href="iframe002.html">Acesse a segunda página</a></p>
  <p><a href="iframe003.html">Acesse a terceira página</a></p>
  <p><a href="iframe004.html">Acesse a quarta página</a></p>
</body>
</html>
