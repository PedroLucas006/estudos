<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Tabelas</title>
    <style>
    table {
      width: 400px;
      height: 400px;
      border-collapse: collapse;
    }
    tr.linha {
      background-color: gray;
      color: white;
      text-align: center;
      vertical-align: bottom;
    }
    td.dado {
      background-color: red;
    }
    td {
      border: 1px solid black;
      padding: 8px;
    }
    </style>
</head>
<body>
  <h1>Mimha primeira tabela</h1>
  
  <table>
    <tr>
      <td>A1</td>
      <td class="dado">B2</td>
      <td>C1</td>
    </tr>

    <tr>
      <td class="dado">A2</td>
      <td>B2</td>
      <td class="dado">C2</td>
    </tr>

    <tr>
      <td>A3</td>
      <td class="dado">B3</td>
      <td>C3</td>
    </tr>

    <tr class="linha">
      <td>A4</td>
      <td>B4</td>
      <td>C4</td>
    </tr>

    <tr>
      <td>A5</td>
      <td>B5</td>
    </tr>

    <tr>
      <td>A6</td>
    </tr>
  </table>
</body>
</html>
