<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="A new web page">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="favicon.ico">
    <title>Document</title>
    <style>
    table {
      border-collapse: collapse;
    }
    td, th {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }
    tr {
      padding: 10px;
    }
    </style>
</head>
<body>
    <table>
      <tr>
        <th>A</td>
        <th colspan="2">B</td>
      </tr>
      <tr>
        <td rowspan="3">D</td>
        <td colspan="2">E</td>
        <td>F</td>
      </tr>
      <tr>
        <td>G</td>
        <td colspan="2">I</td>
      </tr>
      <tr>
        <td>J</td>
        <td>K</td>
        <td>L</td>
      </tr>
      <tr>
        <td>M</td>
        <td>N</td>
        <td colspan="2">O</td>
      </tr>
    </table>
</body>
</html>
